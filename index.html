<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Tracker | Learn & Grow</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <style>
        /* subtle custom touches - no JS, just visual flair */
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="w-11/12 mx-auto">
    <h1 class=" text-purple-700 font-bold text-[24px] text-center ">PH: Batch-13</h1>

    <nav class=" mt-4 border-2 border-purple-700 p-3 flex justify-between rounded-xl">

        <h1 class=" text-purple-700 font-bold text-[24px] ">Milestone Progress Tracker </h1>
        <button class=" text-purple-700 font-bold text-[12px]"><span><i
                    class="fa-solid fa-arrow-right-from-bracket"></i></span> Sign Out</button>

    </nav>


    <section class=" grid grid-cols-7 gap-4 mt-4">

        <div class="col-span-1  p-2 rounded-md">
            <h2 class="border border-purple-700  rounded-md text-green-500 font-bold text-center">
                Milestones
            </h2>
            <div class="space-y-2 p-4">

                <h3 class="border border-green-500 rounded-md text-green-600 font-bold text-center p-1">Milestone: 1
                </h3>
                <h3 class="border border-green-500 rounded-md text-green-600 font-bold text-center p-1">Milestone: 2
                </h3>
                <h3 class="border border-green-500 rounded-md text-green-600 font-bold text-center p-1">Milestone: 3
                </h3>
                <h3 class="border border-green-500 rounded-md text-green-600 font-bold text-center p-1">Milestone: 4
                </h3>
                <h3 class="border border-green-500 rounded-md text-green-600 font-bold text-center p-1">Milestone: 5
                </h3>
                <h3 class=" bg-green-600 text-white  rounded-md  font-bold text-center p-1">
                    Milestone: 6
                </h3>
                <h3 class="border border-green-500 rounded-md text-green-600 font-bold text-center p-1">Milestone: 7
                </h3>
                <h3 class="border border-green-500 rounded-md text-green-600 font-bold text-center p-1">Milestone: 8
                </h3>
                <h3 class="border border-green-500 rounded-md text-green-600 font-bold text-center p-1">Milestone: 9
                </h3>

            </div>


        </div>



        <div class="col-span-4 bg-green-200">
            <h2 class="text-center">Milestone Key Learning</h2>
            <h3 class=" bg-green-600 text-white    font-bold text-center p-1">
                Milestone: 6
            </h3>
            <div class=" flex justify-between">
                <p>Upcoming</p>
                <p>Published</p>

            </div>
        </div>



        <div class="col-span-2 bg-green-100">
            <h2 class="text-center">Important Notes</h2>
        </div>


    </section>




</body>

</html>
